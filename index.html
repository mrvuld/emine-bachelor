<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emine – Unser Stolz</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(180deg,#f6efe7,#efe2d4);
color:#3e2f25;
text-align:center;
overflow-x:hidden;
}

.section{
display:none;
min-height:100vh;
padding:60px 20px;
box-sizing:border-box;
}

.section.active{
display:block;
animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

h1,h2{
font-family:'Playfair Display',serif;
}

.hint{
font-size:14px;
color:#b7865e;
margin-top:5px;
opacity:0.8;
font-family:'Playfair Display',serif;
}

.gallery{
display:flex;
align-items:center;
justify-content:center;
gap:30px;
margin-top:30px;
}

.arrow{
font-size:40px;
cursor:pointer;
color:#b7865e;
user-select:none;
transition:0.3s;
}

.arrow:hover{
transform:scale(1.2);
color:#8c5e3c;
}

.viewer{
width:420px;
height:540px;
perspective:1000px;
cursor:pointer;
}

.viewer-inner{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:transform 0.6s cubic-bezier(.4,2,.3,1);
}

.viewer.flip .viewer-inner{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
border-radius:24px;
overflow:hidden;
backface-visibility:hidden;
box-shadow:0 25px 70px rgba(0,0,0,0.2);
display:flex;
align-items:center;
justify-content:center;
background:white;
}

.front img{
width:100%;
height:100%;
object-fit:cover;
}

.back{
transform:rotateY(180deg);
padding:30px;
background:#fffaf4;
}

.note{
background:#fffdf9;
padding:18px;
border-radius:18px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
font-style:italic;
line-height:1.5;
}

button{
margin-top:30px;
background:#d6a77a;
border:none;
padding:10px 24px;
border-radius:30px;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#b7865e;
transform:scale(1.07);
}

.gold{
font-size:40px;
background:linear-gradient(45deg,#d4af37,#f7e7a1,#d4af37);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 25px rgba(212,175,55,0.6);
}

.music-btn{
position:fixed;
top:20px;
right:20px;
z-index:10;
}

.confetti{
position:fixed;
width:10px;
height:10px;
border-radius:50%;
pointer-events:none;
}
</style>
</head>

<body>

<button class="music-btn" onclick="startMusic()">🎵 Musik</button>

<audio id="bgMusic" preload="auto" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<audio id="cameraSound" preload="auto">
<source src="camera.mp3" type="audio/mpeg">
</audio>

<!-- START -->
<div class="section active" id="s1">
<h1>EMINE.</h1>
<p class="hint">Drück oben rechts auf 🎵 für Musik</p>
<p>Unser Stolz. Unsere Drama Queen.</p>
<button onclick="showSection(2)">Weiter</button>
</div>

<!-- ABI -->
<div class="section" id="s2">
<h2>Abi Zeit ✨</h2>
<p class="hint">Klick auf das Bild für Kommentare ✨</p>
<p class="hint">Benutze ← → um durch die Galerie zu gehen</p>

<div class="gallery">
<div class="arrow" onclick="prevImage('abi')">←</div>

<div class="viewer" onclick="flip(this)">
<div class="viewer-inner">
<div class="front"><img id="abiImg"></div>
<div class="back"><div class="note" id="abiText"></div></div>
</div>
</div>

<div class="arrow" onclick="nextImage('abi')">→</div>
</div>

<button onclick="showSection(3)">Kapitel weiter</button>
</div>

<script>
const galleries={
abi:{
images:["abi1.jpg","abi2.jpg","abi3.jpg","abi4.jpg"],
texts:[
"Drama Queen, aber mit Lernzetteln.",
"Abi, aber main character.",
"„Ich schaffe das.“ (Innerlich: absoluter Stress.)",
"Plot Twist: Es war nur der Anfang."
],
index:0
}
};

function updateGallery(type){
document.getElementById(type+"Img").src=galleries[type].images[galleries[type].index];
document.getElementById(type+"Text").innerText=galleries[type].texts[galleries[type].index];
}

function nextImage(type){
galleries[type].index=(galleries[type].index+1)%galleries[type].images.length;
updateGallery(type);
}

function prevImage(type){
galleries[type].index=(galleries[type].index-1+galleries[type].images.length)%galleries[type].images.length;
updateGallery(type);
}

function showSection(n){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");
}

function flip(card){
card.classList.toggle("flip");
const sound=document.getElementById("cameraSound");
if(sound){
sound.pause();
sound.currentTime=0;
sound.play().catch(()=>{});
}
}

function startMusic(){
document.getElementById("bgMusic").play();
}

updateGallery("abi");
</script>

</body>
</html>
