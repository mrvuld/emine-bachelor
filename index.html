<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Herzlichen Glückwunsch Emine 🎓</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #fdf6f0, #f8e8ff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    overflow: hidden;
}

.container {
    max-width: 600px;
    padding: 20px;
}

h1 {
    font-size: 2.5rem;
    margin-bottom: 20px;
}

button {
    padding: 12px 25px;
    font-size: 1rem;
    border: none;
    border-radius: 30px;
    background-color: #6c63ff;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: #574fd6;
    transform: scale(1.05);
}

.hidden {
    display: none;
}

#message {
    margin-top: 20px;
    font-size: 1.2rem;
    min-height: 60px;
}

.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background-color: red;
    top: -10px;
    animation: fall 3s linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
    }
}

</style>
</head>
<body>

<div class="container" id="start">
    <h1>Hey... 👀</h1>
    <p>Irgendwas Großes ist heute passiert...</p>
    <button onclick="reveal()">Klick mich</button>
</div>

<div class="container hidden" id="surprise">
    <h1>🎓 HERZLICHEN GLÜCKWUNSCH EMINE 🎉</h1>
    <p>Du hast offiziell deinen Bachelor in<br><strong>Lehramt auf Bio & Deutsch</strong> geschafft!</p>

    <button onclick="showStats()">Wie hast du das geschafft?</button>
    <div id="message"></div>
</div>

<script>
function reveal() {
    document.getElementById("start").classList.add("hidden");
    document.getElementById("surprise").classList.remove("hidden");
    launchConfetti();
    typeMessage("Emine, du schaffst einfach alles. Du bist klug, stark und unglaublich beeindruckend. Ich bin richtig stolz auf dich 💛");
}

function showStats() {
    document.getElementById("message").innerHTML = 
    "📚 Lernlevel: 1000%<br>☕ Kaffeelevel: kritisch<br>🧠 Intelligenzlevel: Elite<br>💛 Stolzlevel: unendlich";
}

function typeMessage(text) {
    let i = 0;
    let speed = 40;
    let messageBox = document.getElementById("message");
    messageBox.innerHTML = "";
    function typing() {
        if (i < text.length) {
            messageBox.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }
    typing();
}

function launchConfetti() {
    for (let i = 0; i < 80; i++) {
        let confetti = document.createElement("div");
        confetti.classList.add("confetti");
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.backgroundColor = 
            ["#ff6b6b", "#6c63ff", "#ffd93d", "#6bcB77", "#ff8fab"]
            [Math.floor(Math.random() * 5)];
        confetti.style.animationDuration = (Math.random() * 2 + 2) + "s";
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 3000);
    }
}
</script>

</body>
</html>
